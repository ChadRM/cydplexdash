; PlatformIO project for the ESP32-2432S028R ("Cheap Yellow Display")
; Plex now-playing dashboard: TFT_eSPI (display) + LVGL (UI) + ArduinoJson (Plex API) + TJpg_Decoder (cover art)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; No OTA needed here - trade the default dual-OTA partition layout for one large app
; partition (~3MB instead of ~1.3MB), since LVGL + TFT_eSPI + WiFi push flash usage high.
board_build.partitions = huge_app.csv

lib_deps =
    bodmer/TFT_eSPI
    lvgl/lvgl @ ^8.3.0
    bblanchon/ArduinoJson @ ^7.0.0
    bodmer/TJpg_Decoder
    tedtoal/XPT2046_Touchscreen_TT
    ; Not used directly - satisfies XPT2046_Touchscreen_TT's bundled (unused) TS_Display.cpp,
    ; which unconditionally includes Adafruit_GFX.h.
    adafruit/Adafruit GFX Library

build_flags =
    ; Project include/ dir must be on the path explicitly - PlatformIO does not propagate it
    ; to library builds automatically, and lvgl's font files need to find our lv_conf.h there.
    -I include

    ; --- TFT_eSPI pin config for the CYD 2432S028R (ILI9341, SPI) ---
    ; USER_SETUP_LOADED skips TFT_eSPI's own User_Setup.h and takes config entirely from these flags.
    -D USER_SETUP_LOADED=1
    -D ILI9341_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000
    ; If colors look inverted/wrong on your specific board batch, try swapping to
    ; -D ILI9341_2_DRIVER=1 instead of ILI9341_DRIVER=1 - a known clone-panel quirk.

    ; --- LVGL config lookup ---
    ; Tells lvgl.h to find lv_conf.h via the normal include path (include/lv_conf.h)
    ; instead of the default relative "../../lv_conf.h".
    -D LV_CONF_INCLUDE_SIMPLE=1
    ; Generated custom fonts (src/fonts/) do "#include lvgl.h" and need this flag to pick the
    ; same simple/flat include path as the rest of the project instead of "lvgl/lvgl.h".
    -D LV_LVGL_H_INCLUDE_SIMPLE=1

; Touch (XPT2046) is on its OWN dedicated SPI bus on this board, NOT shared with the display
; (confirmed via the seller's reference firmware) - MOSI 32, MISO 39, SCK 25, CS 33, IRQ 36.
; This is why TFT_eSPI's built-in touch support (which assumes a shared bus) can't be used
; here; see the touchSPI/XPT2046_Touchscreen setup in main.cpp instead.
